# Note:
#   - Match patterns: https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#patterns-to-match-file-paths

name: Build and Push Docker image to GHCR and ECR

on:
  # on.push - workflow to run only for pushes targeting specific branches
  push:
    branches:
      # - main
      # - 'release/**' # Wildcard that matches characters and forward slash
      - 'release/*' # Wildcard that matches characters

  # on.pull_request - workflow to run only for PRs targeting specific branches
  # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#onpull_requestpull_request_targetbranchesbranches-ignore
#  pull_request:
#    branches:
#      - main

permissions:  # As top-level key to apply to all jobs (even though there is only one job)
  id-token: write  # Required for requesting the JWT OIDC token from AWS
  contents: read   # Required to checkout the repository code
  packages: write  # To write the built image to GHCR

env:
  # GHCR
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

  # ECR
  # AWS_REGION: ${{ secrets.AWS_REGION }}                 # e.g., us-east-1
  # AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}             # Role ARN created for GitHub OIDC
  # ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}         # Your ECR repository name
  AWS_REGION: us-west-2
  AWS_ROLE_ARN: arn:aws:iam::797606048112:role/thrombotrack-github-actions-ecr-role
  ECR_REPOSITORY: arn:aws:ecr:us-west-2:797606048112:repository/thrombotrack
  OIDC_AUDIENCE: sts.amazonaws.com


jobs:
  build-and-push:
    name: Build and publish image to GHCR and ECR
    runs-on: ubuntu-latest

    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3 # Action provided by Docker but this is a generic tool that works with any OCI conforming registry
        with: # Each is a key/value pair with the key capitalized and prefixed with "INPUT_"
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Authenticate with AWS via OIDC (Token Exchange)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: ${{ env.OIDC_AUDIENCE}} # This post shows the usage of this variable - https://fabianlee.org/2026/01/27/github-workflow-authentication-to-aws-using-oidc/

      # Login to the private Amazon ECR Registry
      - name: Log in to Amazon ECR
        id: login-ecr # Unique ID for the step, not job - https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#jobsjob_idstepsid
        uses: aws-actions/amazon-ecr-login@v2

      # Build the Dockerfile and push to ECR with GitHub Actions Caching
      #   - `github.sha` uses the github object context reference
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.vars.outputs.SHORT_SHA }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          # tags: |
          #   ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          #   ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Output a shortened SHA for later use
      - name: Extract short SHA
        id: vars
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # Build and push to GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with: # Each is a key/value pair with the key capitalized and prefixed with "INPUT_"
          context: ./api
          file: ./api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.SHORT_SHA }}
          # tags: |
          #   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          #   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
