# Docker compose for API and DB
#
# Note:
# - env_file attr is for runtime, however, compose lookup automatically reads
#   the local .env file before parsing the YAML and thus can be used to provide
#   args for build time (args attribuite).

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        - API_PORT=${API_PORT}
    ports:
      - "${API_PORT}:${API_PORT}"
    env_file:
      - path: ./.env
        required: true
        format: raw
      # - PYTHONPATH=/ecmo-api # TODO: Delete this variable because this variable should already be set inside the container.
      # - DATABASE_URL=${DATABASE_URL}  # TODO: Delete because db url is constructed using env variable
    # TODO: Delete the volumes in the api service. I don't think we need to bind current directory to the container.
    # volumes:
    #   - .:/ecmo-api
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:18-alpine
    env_file:
      - path: ./.env
        required: true
    volumes:
      - postgres_data:/var/lib/postgresql
      # - ./backups:/backups  # TODO: Delete this b/c we do not have backup in the local folder
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # expo_start:
